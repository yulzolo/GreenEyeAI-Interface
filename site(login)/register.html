  <div class="class wrapper">
    <form action="">
      <h1>Регистрация</h1>
      <div class="input-box">
        <input type="text" placeholder="Полное имя" required>
      </div>
      <div class="input-box">
        <input type="text" placeholder="Email" required>
        <i class="bx bx-user"></i>
      </div>
      <div class="input-box">
        <input type="password" placeholder="Пароль" required="required" type="password" id="password" oninput="check()"> 
        <i class="bx bx-lock"></i>
      </div>
      <div class="input-box">
        <input type="password" placeholder="Подтвердите пароль" required="required" type="password" id="password_confirm" oninput="check()">
        <i class="bx bx-lock"></i>
      </div>
      <div class="remember">
        <label for=""><input type="checkbox" required>Соглашаюсь</label>
      </div>

      <button type="submit" class="btn">Зарегистрироваться</button>



</body>

<script>    
    function check() {
    var input = document.getElementById('password_confirm');
    if (input.value != document.getElementById('password').value) {
        input.setCustomValidity('Пароли должны совпадать');
    } else {
        input.setCustomValidity('');
    }
}
</script>
